<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>AI Resume ATS</title>

    <!-- Mobile Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #eef2f3, #dfe9f3);
            font-family: 'Segoe UI', sans-serif;
        }

        .hero {
            text-align: center;
            margin-top: 40px;
            padding: 10px;
        }

        .hero h1 {
            font-weight: bold;
            font-size: clamp(24px, 5vw, 42px);
        }

        .hero p {
            color: #555;
            font-size: clamp(14px, 2.5vw, 18px);
        }

        .upload-card {
            max-width: 500px;
            width: 100%;
            margin: 30px auto;
            padding: 25px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        .form-control, .form-select {
            border-radius: 10px;
            padding: 12px;
            font-size: 14px;
        }

        .btn-custom {
            background: linear-gradient(45deg, #000, #444);
            color: #fff;
            border-radius: 10px;
            padding: 12px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-custom:hover {
            transform: scale(1.03);
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
            font-weight: bold;
        }

        /* Mobile spacing */
        @media (max-width: 576px) {
            .upload-card {
                padding: 20px;
                margin: 20px;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <div class="hero">
        <h1>🚀 AI Resume ATS Scanner</h1>
        <p>Analyze your resume like real corporate ATS</p>
    </div>

    <div class="upload-card">

        <form id="uploadForm" action="/uploadResume" method="post" enctype="multipart/form-data">

            <div class="mb-3">
                <label class="form-label">Upload Resume</label>
                <input type="file" class="form-control" name="file" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Select Role</label>
                <select class="form-select" name="role" required>
                    <option value="">Choose Role</option>
                    <option value="JAVA_DEVELOPER">Java Developer</option>
                    <option value="PYTHON_DEVELOPER">Python Developer</option>
                    <option value="DEVOPS_ENGINEER">DevOps Engineer</option>
                </select>
            </div>

            <button type="submit" class="btn btn-custom w-100">
                Analyze Resume
            </button>

        </form>

        <div id="loading" class="loading">
            🤖 Analyzing Resume...
        </div>

    </div>

</div>

<script>
document.getElementById("uploadForm").addEventListener("submit", function() {
    document.getElementById("loading").style.display = "block";
});
</script>

</body>
</html>
