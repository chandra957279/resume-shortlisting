<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>ATS Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fa;
        }

        .card {
            border-radius: 12px;
        }

        .circle {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            margin: auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            background: conic-gradient(#4caf50 0deg, #ddd 0deg);
        }

        .circle span {
            font-size: 14px;
        }

        .circle h4 {
            margin: 0;
        }

        ul {
            list-style: none;
            padding-left: 0;
        }
    </style>
</head>

<body>

<div class="container py-5">

    <!-- TITLE -->
    <h2 class="text-center mb-4">🚀 ATS Resume Dashboard</h2>

    <!-- 🔥 CIRCULAR STATS -->
    <div class="row text-center mb-5">

        <div class="col-md-4">
            <div class="circle" data-value="[[${score}]]">
                <span>Score</span>
                <h4>[[${score}]]%</h4>
            </div>
        </div>

        <div class="col-md-4">
            <div class="circle" data-value="[[${projectCount * 20}]]">
                <span>Projects</span>
                <h4>[[${projectCount}]]</h4>
            </div>
        </div>

        <div class="col-md-4">
            <div class="circle" data-value="[[${experience * 20}]]">
                <span>Experience</span>
                <h4>[[${experience}]] yr</h4>
            </div>
        </div>

    </div>

    <!-- 🔥 SKILL ANALYSIS -->
    <div class="row">

        <!-- MATCHED -->
        <div class="col-md-6">
            <div class="card shadow p-4">
                <h5 class="text-success mb-3">✅ Matched Skills</h5>

                <ul>
                    <li th:each="skill : ${matchedSkills}" class="text-success fw-bold">
                        ✔ <span th:text="${skill}"></span>
                    </li>
                </ul>
            </div>
        </div>

        <!-- MISSING -->
        <div class="col-md-6">
            <div class="card shadow p-4">
                <h5 class="text-danger mb-3">❌ Missing Skills</h5>

                <ul>
                    <li th:each="skill : ${missingSkills}" class="text-danger fw-bold">
                        ✘ <span th:text="${skill}"></span>
                    </li>
                </ul>
            </div>
        </div>

    </div>

    <!-- 🔥 BUTTONS -->
    <div class="text-center mt-5">
        <a href="/" class="btn btn-primary me-2">Scan Another</a>
        <a href="/downloadPdf" class="btn btn-success">Download PDF Report</a>
    </div>

</div>

<!-- 🔥 ANIMATION SCRIPT -->
<script>
document.querySelectorAll(".circle").forEach(circle => {

    let value = circle.getAttribute("data-value");
    let current = 0;

    let interval = setInterval(() => {

        if (current >= value) {
            clearInterval(interval);
        } else {
            current++;
            circle.style.background =
                `conic-gradient(#4caf50 ${current * 3.6}deg, #ddd 0deg)`;
        }

    }, 15);
});
</script>

</body>
</html>
