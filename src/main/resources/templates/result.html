<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>ATS Dashboard</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fa;
        }

        h2 {
            font-size: clamp(22px, 4vw, 32px);
        }

        .card {
            border-radius: 12px;
        }

        .circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            background: conic-gradient(#4caf50 0deg, #ddd 0deg);
        }

        .circle h4 {
            margin: 0;
            font-size: 20px;
        }

        ul {
            list-style: none;
            padding-left: 0;
        }

        /* Mobile fix */
        @media (max-width: 576px) {
            .circle {
                width: 90px;
                height: 90px;
            }
        }
    </style>
</head>

<body>

<div class="container py-4">

    <h2 class="text-center mb-4">🚀 ATS Resume Dashboard</h2>

    <!-- STATS -->
    <div class="row text-center mb-4 g-3">

        <div class="col-4">
            <div class="circle" data-value="[[${score}]]">
                <h4>[[${score}]]%</h4>
                <small>Score</small>
            </div>
        </div>

        <div class="col-4">
            <div class="circle" data-value="[[${projectCount * 20}]]">
                <h4>[[${projectCount}]]</h4>
                <small>Projects</small>
            </div>
        </div>

        <div class="col-4">
            <div class="circle" data-value="[[${experience * 20}]]">
                <h4>[[${experience}]] yr</h4>
                <small>Experience</small>
            </div>
        </div>

    </div>

    <!-- SKILLS -->
    <div class="row g-3">

        <div class="col-12 col-md-6">
            <div class="card shadow p-3">
                <h5 class="text-success">✅ Matched Skills</h5>
                <ul>
                    <li th:each="skill : ${matchedSkills}" class="text-success">
                        ✔ <span th:text="${skill}"></span>
                    </li>
                </ul>
            </div>
        </div>

        <div class="col-12 col-md-6">
            <div class="card shadow p-3">
                <h5 class="text-danger">❌ Missing Skills</h5>
                <ul>
                    <li th:each="skill : ${missingSkills}" class="text-danger">
                        ✘ <span th:text="${skill}"></span>
                    </li>
                </ul>
            </div>
        </div>

    </div>

    <!-- BUTTONS -->
    <div class="text-center mt-4">
        <a href="/" class="btn btn-primary mb-2">Scan Another</a>
        <a href="/downloadPdf" class="btn btn-success mb-2">Download PDF</a>
    </div>

</div>

<script>
document.querySelectorAll(".circle").forEach(circle => {
    let value = circle.getAttribute("data-value");
    let current = 0;

    let interval = setInterval(() => {
        if (current >= value) {
            clearInterval(interval);
        } else {
            current++;
            circle.style.background =
                `conic-gradient(#4caf50 ${current * 3.6}deg, #ddd 0deg)`;
        }
    }, 15);
});
</script>

</body>
</html>
